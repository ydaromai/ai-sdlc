name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref (avoid stacking redundant CI on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Verify toolchain (jq, python3, bats)
        run: |
          jq --version
          python3 --version
          bats --version

      - name: Validate plugin manifests & script syntax
        run: |
          set -e
          echo "· JSON manifests"
          for j in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json \
                   pipeline/scripts/agent-config.json package.json scripts/jira/package.json; do
            jq empty "$j" && echo "  ok $j"
          done
          echo "· shell syntax (bash -n)"
          for s in pipeline/scripts/*.sh pipeline/scripts/lib/*.sh; do
            bash -n "$s" && echo "  ok $s"
          done
          echo "· python syntax"
          python3 -m py_compile pipeline/scripts/parse-plan.py && echo "  ok parse-plan.py"

      - name: Structure tests (builder + critic personas)
        run: npm run test:structure

      - name: JIRA package tests
        run: npm run test:jira

      - name: Shell script tests (bats)
        run: npm run test:scripts
