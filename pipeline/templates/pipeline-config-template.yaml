# Pipeline Configuration Template
# Copy this file to your project root as `pipeline.config.yaml` and customize.

pipeline:
  # Project type flags — enable conditional critic agents
  has_frontend: false            # Set true for projects with frontend code (enables Designer Critic)
  has_backend_service: false     # Set true for long-running services: API servers, workers, queue consumers (enables Observability Critic)
  has_api: false                 # Set true for projects exposing or consuming HTTP/GraphQL/gRPC APIs (enables API Contract Critic)
  has_ml: false                  # Set true for projects with ML/AI/LLM features (enables ML Critic)

  # Foundation project support — set assumes_foundation: true when building on a starter project
  assumes_foundation: true        # Enable foundation-aware pipeline behavior (scaffold stage, guard rails)
  # foundation:                   # Required when assumes_foundation: true
  #   repo_url: ""                # Foundation repo URL to clone
  #   target_dir: ""              # Where to scaffold the project
  #   venture_name: ""            # Project display name
  #   supabase_project_ref: ""    # Optional Supabase project ref
  #   remote_url: ""              # Optional git remote for the new project
  #   roles:                      # Custom roles (optional)
  #     - admin
  #     - manager
  #     - viewer

  # TDD pipeline settings (used by /tdd-fullpipeline and /tdd-figma-fullpipeline)
  tdd:
    unattended: false                          # true = run lights-out (auto-approve gates unless a hard-stop trips); or pass --unattended
    unattended_require_deploy_approval: false  # true = even unattended, stop for a human before the Stage 14 staging deploy
    max_mock_routes: 20                        # cap on routes crawled during mock/Figma analysis
    max_test_adjustment_pct: 20                # max % of pre-written behavioral tests the executor may edit (security tests are immutable)
    tests_branch_pattern: "tdd/{slug}/tests"   # branch for Tier-1 tests (Tier-2 uses tdd/{slug}/tier2-tests)
    self_health_gate: true                     # require all new tests RED before code exists (catches fake always-green tests)
    generate_benchmarks: false                 # emit performance benchmarks during Tier-2 test development
    # self_health_timeout_ms: 120000           # timeout for the red-before-green self-health check
    # self_health_fix_timeout_ms: 300000       # timeout for auto-fixing self-health failures
    # critic_iteration_timeout_ms: 600000      # timeout per critic Ralph-Loop iteration

  # Staging deploy target (TDD Stages 14–16)
  staging:
    url: ""                                    # staging base URL for tests-vs-staging / E2E-vs-staging
    deploy_command: ""                         # command that deploys the current branch to staging (e.g., "vercel deploy --prebuilt")

  # JIRA integration
  jira:
    project_key: PROJ           # Your JIRA project key (e.g., MVP, CD)
    host: https://yourteam.atlassian.net
    env_file: .env.jira         # Path to JIRA credentials file

  # Critic validation settings
  validation:
    default_mode: parallel      # parallel | sequential
    max_iterations: 5           # Max iterations for PRD and dev plan Ralph Loops
    escalation: user            # user | skip | fail
    stages:
      req2prd:
        critics: [product, dev, devops, qa, security, performance, data-integrity, observability, api-contract, designer, ml]  # conditional: observability (has_backend_service), api-contract (has_api), designer (has_frontend), ml (has_ml)
        mode: parallel
      prd2plan:
        critics: [product, dev, devops, qa, security, performance, data-integrity, observability, api-contract, designer, ml]  # conditional: observability (has_backend_service), api-contract (has_api), designer (has_frontend), ml (has_ml)
        mode: parallel
      plan2jira:
        critics: [product, dev]
        mode: parallel
        mandatory: true         # Must pass before JIRA creation
      execute:
        critics: [product, dev, devops, qa, security, performance, data-integrity, observability, api-contract, designer, ml]  # conditional: observability (has_backend_service), api-contract (has_api), designer (has_frontend), ml (has_ml)
        mode: parallel
      test:
        critics: [product, dev, devops, qa, security, performance, data-integrity, observability, api-contract, designer, ml]  # conditional: observability (has_backend_service), api-contract (has_api), designer (has_frontend), ml (has_ml)
        mode: parallel
      pre_merge:
        critics: [dev, devops, security, performance, data-integrity, observability, api-contract, designer, ml]  # conditional: observability (has_backend_service), api-contract (has_api), designer (has_frontend), ml (has_ml)
        mode: sequential        # DevOps reviews after Dev passes
  # PRD quality scoring thresholds
  scoring:
    per_critic_min: 8.5         # Minimum score per critic (1-10 scale)
    overall_min: 9.0            # Minimum average across all critics
    # Note: max iterations for scoring uses validation.max_iterations above

  # Execution settings
  execution:
    ralph_loop:
      build_models:
        simple: opus
        medium: opus            # Opus — Single-file logic, endpoints
        complex: opus           # Opus — Multi-file, complex logic
      review_model: opus        # Opus — review subagents
      critic_model: opus        # Opus — individual critic subagents
      fresh_context: true       # Fresh CLI session per iteration
      max_iterations: 3         # Max build-review cycles
      escalation: user          # user | skip | fail
    parallel_stories: true      # Enable cross-story parallelism
    parallel_tasks: true        # Enable within-story parallelism (respects dependencies)
    subtask_jira_sync: true     # Sync subtask-level (x.x.x) JIRA issues during execution (set false to skip)
    branch_pattern: "feat/story-{S}-task-{T}-{slug}"

  # Test commands (override per project)
  test_commands:
    unit: "npm test"
    integration: "npm run test:integration"
    ui: "npm run test:ui"
    all: "npm run test:all"
    e2e: "npx playwright test"              # Mandatory when has_frontend: true
    # component: "npm run test:component"   # Component test command (uncomment to enable; typically for has_frontend: true projects)

  # Test requirements: file pattern → required test types (project defaults)
  # PRD Testing Strategy can override/extend these per feature.
  test_requirements:
    "lib/**/*.js": [unit, integration]
    "public/**": [ui]
    "bq/**/*.sql": [integration]
    "model/**": [schema_validation]
    "scripts/**/*.js": [unit]
    # AI Data Analytics patterns (uncomment for projects with AI-powered analytics)
    # "ai-analytics/**": [unit, integration]
    # "nl2sql/**": [unit, integration]
    # "ai-predictions/**": [unit, integration]
    # "anomaly/**": [unit, integration]

  # Pre-delivery smoke test (Step 5 of /execute-plan)
  # Canonical schema is in commands/execute-plan.md — keep both in sync.
  # When this section is omitted, /execute-plan uses auto-detection from has_frontend/has_backend_service flags.
  # Uncomment and customize to override auto-detection.
  # smoke_test:
  #   enabled: true                  # set to false to skip (e.g., libraries, CLI tools, data pipelines)
  #   # start_command: "pnpm dev"   # default: auto-detected from lockfile (omit to auto-detect)
  #   port: 3000                     # dev-server port for health-check auto-detection (default 3000)
  #   api_port: 3001                 # API server port for /health auto-detection (default: port + 1)
  #   startup_timeout_seconds: 30    # max wait for server readiness
  #   ready_patterns:                # case-insensitive substrings to match in server output (replaces defaults if set)
  #     - "ready"
  #     - "listening"
  #     - "started"
  #     - "compiled successfully"
  #     - "running"
  #     - "available"
  #   endpoints:                     # health check URLs (overrides auto-detect from has_frontend/has_backend_service)
  #     - { url: "http://localhost:3000", expect_status: 200 }
  #     - { url: "http://localhost:3001/health", expect_status: 200, expect_body_contains: "ok" }
  #   endpoint_timeout_seconds: 10   # per-endpoint HTTP timeout
  #   entry_url: "http://localhost:3000"
  #   interaction_endpoint: null     # e.g., "POST /api/chat" — auto-inferred from PRD if omitted
  #   has_llm: true                  # whether to test with LLM_MOCK=false
  #   llm_api_key_env: null          # e.g., "ANTHROPIC_API_KEY" — auto-detect from .env if omitted
  #   llm_timeout_seconds: 30       # timeout for LLM API requests during smoke test
  #   max_fix_attempts: 2            # max smoke test fix iterations before escalating to user

  # Browser-based validation (when has_frontend: true)
  # Enables headless browser smoke testing, multi-viewport screenshot capture, and DOM verification.
  # When has_frontend: false, this entire section is ignored.
  # Uncomment and customize to override defaults.
  # browser_testing:
  #   tool: "playwright"                         # Browser automation tool (only "playwright" supported)
  #   headless: true                             # Run browser in headless mode (default: true; no display server required)
  #   screenshot_dir: ".pipeline/screenshots"    # Directory for captured screenshots (cleaned each run)
  #   viewports:                                 # Viewport sizes for multi-viewport screenshot capture
  #     mobile: { width: 375, height: 812 }      # Mobile viewport (iPhone-class)
  #     tablet: { width: 768, height: 1024 }     # Tablet viewport (iPad-class)
  #     desktop: { width: 1280, height: 720 }    # Desktop viewport (standard HD)
  #   smoke_test_routes: []                      # Explicit routes to screenshot (overrides auto-detection; empty = auto-detect)
  #   max_routes: 10                             # Maximum routes to screenshot (caps auto-detection)
  #   max_console_errors: 0                      # Maximum allowed console.error events across all page loads (0 = strict)
  #   visual_regression: false                   # Enable visual regression testing (deferred — not yet implemented)
  #   auto_install: false                        # Auto-install Playwright browsers in CI (default: false; never installs without consent)

  # Project-specific paths (override per project)
  paths:
    prd_dir: "docs/prd"
    dev_plans_dir: "docs/dev_plans"
    agent_constraints: "docs/ai_definitions/AGENT_CONSTRAINTS.md"
    breakdown_definition: "docs/ai_definitions/TASK_BREAKDOWN_DEFINITION.md"
    pipeline_definition: "docs/ai_definitions/PIPELINE.md"   # canonical devflow stage map (read by /devflow, /clear_and_go, /trace-upstream)
    jira_import: "scripts/jira/jira-import.js"
    jira_transition: "scripts/jira/transition-issue.js"
